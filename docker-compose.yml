services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.portf.loadbalancer.server.port=3000"
      - "traefik.http.routers.portf-http.rule=Host(`lakhdarberache.fr`) || Host(`www.lakhdarberache.fr`)"
      - "traefik.http.routers.portf-http.entrypoints=web"
      - "traefik.http.routers.portf-http.middlewares=portf-https-redirect"
      - "traefik.http.middlewares.portf-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.portf.rule=Host(`lakhdarberache.fr`) || Host(`www.lakhdarberache.fr`)"
      - "traefik.http.routers.portf.entrypoints=websecure"
      - "traefik.http.routers.portf.tls=true"
      - "traefik.http.routers.portf.tls.certresolver=letsencrypt"

networks:
  proxy:
    external: true
